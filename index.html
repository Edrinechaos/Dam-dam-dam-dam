<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE TOURNAMENT MANAGER Pro</title>
    <style>
        :root { --primary: #00ff88; --gold: #ffd700; --silver: #c0c0c0; --bg: #0a0a0a; --card: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .section { background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid var(--primary); }
        h1, h3 { color: var(--primary); text-transform: uppercase; margin-top: 0; }
        
        .awards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .award-card { background: #222; padding: 15px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--gold); }
        .clean-sheet { border-bottom-color: var(--silver); }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #333; }
        th { background: #252525; }

        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        input, select, button { padding: 10px; border-radius: 5px; border: none; background: #333; color: white; }
        button { background: var(--primary); color: black; font-weight: bold; cursor: pointer; }
        button.danger { background: #ff4444; color: white; }

        #fixtureList, #historyLog { 
            display: grid; gap: 10px; max-height: 200px; overflow-y: auto; background: #111; padding: 10px; border-radius: 5px;
        }
        #fixtureList { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        .log-entry { font-size: 0.9em; padding: 8px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .fixture-item { font-size: 0.8em; padding: 5px; border-bottom: 1px solid #222; }
        .tag { font-size: 0.7em; background: #444; padding: 2px 5px; border-radius: 3px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Elite Tournament Dashboard</h1>

    <div class="awards-grid">
        <div class="award-card">
            <h4 style="color: var(--gold); margin: 0;">🏆 Top Scorer (Best GD)</h4>
            <div id="topScorerDisplay" style="font-size: 1.2em; margin-top: 10px;">Awaiting Data...</div>
        </div>
        <div class="award-card clean-sheet">
            <h4 style="color: var(--silver); margin: 0;">🛡️ Best Defense (Lowest GA)</h4>
            <div id="cleanSheetDisplay" style="font-size: 1.2em; margin-top: 10px;">Awaiting Data...</div>
        </div>
    </div>

    <div class="section">
        <h3>Manage Roster</h3>
        <div class="flex-row">
            <input type="text" id="newName" placeholder="Enter Player Name">
            <button onclick="addPlayer()">Add Player</button>
        </div>
        <div id="playerTags" class="flex-row"></div>
    </div>

    <div class="section">
        <h3>Live Standings</h3>
        <table id="standingsTable">
            <thead>
                <tr>
                    <th>Pos</th><th>Player</th><th>P</th><th>GD</th><th>GF</th><th>GA</th><th>Pts</th><th>Form</th>
                </tr>
            </thead>
            <tbody id="standingsBody"></tbody>
        </table>
    </div>

    <div class="section">
        <h3>Generated Fixtures</h3>
        <div id="fixtureList"></div>
    </div>

    <div class="section">
        <h3>Record Result</h3>
        <div class="flex-row">
            <select id="p1Select"></select>
            <input type="number" id="p1Score" placeholder="0" style="width: 50px;">
            <span>vs</span>
            <input type="number" id="p2Score" placeholder="0" style="width: 50px;">
            <select id="p2Select"></select>
            <button onclick="submitResult()">Update</button>
        </div>
    </div>

    <div class="section">
        <h3>Match History Log</h3>
        <div id="historyLog">No matches recorded yet.</div>
    </div>

    <button class="danger" onclick="resetAll()">Reset Tournament</button>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('el_players')) || ["Edrine", "Adamz", "Cyber R", "Panic Bruce", "Itsfao", "Rhamim", "Massa", "Edward"];
    let stats = JSON.parse(localStorage.getItem('el_stats')) || {};
    let history = JSON.parse(localStorage.getItem('el_history')) || [];

    function init() {
        players.forEach(p => {
            if (!stats[p]) stats[p] = { p: 0, gf: 0, ga: 0, gd: 0, pts: 0, form: [] };
        });
        renderAll();
    }

    function addPlayer() {
        const name = document.getElementById('newName').value.trim();
        if (name && !players.includes(name)) {
            players.push(name);
            stats[name] = { p: 0, gf: 0, ga: 0, gd: 0, pts: 0, form: [] };
            save(); renderAll();
        }
    }

    function removePlayer(name) {
        if (confirm(`Remove ${name}?`)) {
            players = players.filter(p => p !== name);
            delete stats[name];
            save(); renderAll();
        }
    }

    function renderAll() {
        document.getElementById('playerTags').innerHTML = players.map(p => `
            <span class="tag">${p} <span style="cursor:pointer;color:red" onclick="removePlayer('${p}')">×</span></span>
        `).join('');

        const options = players.map(p => `<option value="${p}">${p}</option>`).join('');
        document.getElementById('p1Select').innerHTML = options;
        document.getElementById('p2Select').innerHTML = options;

        let fixHTML = ""; let count = 1;
        for (let i = 0; i < players.length; i++) {
            for (let j = i + 1; j < players.length; j++) {
                fixHTML += `<div class="fixture-item"><b>M${count}:</b> ${players[i]} vs ${players[j]}</div>`;
                count++;
            }
        }
        document.getElementById('fixtureList').innerHTML = fixHTML;

        const sorted = [...players].sort((a, b) => (stats[b].pts - stats[a].pts) || (stats[b].gd - stats[a].gd));
        document.getElementById('standingsBody').innerHTML = sorted.map((p, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>${p}</td>
                <td>${stats[p].p}</td>
                <td>${stats[p].gd}</td>
                <td>${stats[p].gf}</td>
                <td>${stats[p].ga}</td>
                <td>${stats[p].pts}</td>
                <td>${stats[p].form.slice(-3).join('') || '-'}</td>
            </tr>
        `).join('');

        // Render History Log
        const logBox = document.getElementById('historyLog');
        if (history.length > 0) {
            logBox.innerHTML = history.map(item => `
                <div class="log-entry">
                    <span>${item.p1} <b>${item.s1} - ${item.s2}</b> ${item.p2}</span>
                    <span style="color:#666; font-size:0.8em;">Match #${history.indexOf(item) + 1}</span>
                </div>
            `).join('');
        }

        updateAwards();
    }

    function updateAwards() {
        const activePlayers = players.filter(p => stats[p].p > 0);
        if (activePlayers.length === 0) return;

        const scorer = [...activePlayers].sort((a, b) => (stats[b].gd - stats[a].gd) || (stats[b].gf - stats[a].gf))[0];
        document.getElementById('topScorerDisplay').innerHTML = `<b>${scorer}</b> <br><small>GD: ${stats[scorer].gd}</small>`;

        const defender = [...activePlayers].sort((a, b) => (stats[a].ga - stats[b].ga) || (stats[b].p - stats[a].p))[0];
        document.getElementById('cleanSheetDisplay').innerHTML = `<b>${defender}</b> <br><small>GA: ${stats[defender].ga}</small>`;
    }

    function submitResult() {
        const p1 = document.getElementById('p1Select').value;
        const p2 = document.getElementById('p2Select').value;
        const s1 = parseInt(document.getElementById('p1Score').value);
        const s2 = parseInt(document.getElementById('p2Score').value);

        if (p1 === p2 || isNaN(s1) || isNaN(s2)) return;

        stats[p1].p++; stats[p2].p++;
        stats[p1].gf += s1; stats[p1].ga += s2;
        stats[p2].gf += s2; stats[p2].ga += s1;
        stats[p1].gd = stats[p1].gf - stats[p1].ga;
        stats[p2].gd = stats[p2].gf - stats[p2].ga;

        if (s1 > s2) { stats[p1].pts += 3; stats[p1].form.push('W'); stats[p2].form.push('L'); }
        else if (s2 > s1) { stats[p2].pts += 3; stats[p2].form.push('W'); stats[p1].form.push('L'); }
        else { stats[p1].pts += 1; stats[p2].pts += 1; stats[p1].form.push('D'); stats[p2].form.push('D'); }

        // Add to history (unshift puts new items at top)
        history.unshift({ p1, s1, s2, p2 });
        
        save(); renderAll();
    }

    function save() {
        localStorage.setItem('el_players', JSON.stringify(players));
        localStorage.setItem('el_stats', JSON.stringify(stats));
        localStorage.setItem('el_history', JSON.stringify(history));
    }

    function resetAll() { if (confirm("Reset everything?")) { localStorage.clear(); location.reload(); } }

    init();
</script>
</body>
</html>
